# Minecraft Python Failover Proxy example configuration

[proxy]
listen_host = "0.0.0.0"
listen_port = 25565

[main]
# Route target for players when MAIN is healthy (often Velocity)
host = "127.0.0.1"
port = 25565

[fallback]
host = "127.0.0.1"
port = 25566

[healthcheck]
# tcp: only TCP connect
# minecraft_status: real Minecraft status ping (recommended for backend checks)
mode = "minecraft_status"

# Optional healthcheck target override.
# If unset, main.host/main.port are checked.
# Useful when MAIN=Velocity but health should come from real backend server.
# target_host = "100.x.x.x"
# target_port = 25567

# Protocol version used in status handshake.
protocol_version = 767

# Optional hostname sent in handshake; defaults to target_host/main.host.
# status_hostname = "survival.example.com"

# true: parse and validate response JSON
# false: packet id 0x00 is enough
require_valid_json = true

# log version/players/latency info on successful checks
log_status_details = false

interval_seconds = 3.0
timeout_seconds = 2.0
fail_after = 2
recover_after = 2

[connection]
timeout_seconds = 5.0
buffer_size = 65536

[logging]
level = "INFO"
