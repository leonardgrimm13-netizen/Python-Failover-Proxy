# Minecraft Python Failover Proxy example configuration

[proxy]
listen_host = "0.0.0.0"
listen_port = 25565

[main]
# Route target for players when MAIN is healthy.
# Example: local Velocity instance behind the failover proxy.
# IMPORTANT: Velocity must NOT listen on the same host+port as the failover proxy.
host = "127.0.0.1"
port = 25564

[fallback]
# Fallback / waiting room server.
host = "127.0.0.1"
port = 25566

[healthcheck]
# Healthcheck mode:
# - "tcp": simple TCP reachability check against MAIN/main target.
# - "minecraft_status": real Minecraft status ping.
#
# For a first start, "tcp" is the safest default.
# For Velocity setups, use "minecraft_status" and set target_host/target_port below.
mode = "tcp"

# Optional healthcheck override.
# If unset, main.host/main.port are checked.
# Useful when main points to Velocity but health should come from the real backend.
# Example:
# target_host = "100.64.0.10"
# target_port = 25567

# Minecraft status handshake protocol version (default: 767).
# Used only for mode = "minecraft_status".
protocol_version = 767
# status_hostname = "survival.example.com"

# true: require and parse valid JSON status response.
# false: accept valid status packet id 0x00 without JSON parsing.
require_valid_json = true

# true: log successful status details (version/players/latency).
# Can be noisy with low interval_seconds.
log_status_details = false
# Optional minecraft_status readiness filters.
# 0 or empty values disable the filter.
# Text filters are case-sensitive.
# JSON-based filters require require_valid_json = true.
# max_latency_ms also works without JSON parsing.
max_latency_ms = 0.0
expected_version_contains = ""
motd_must_contain = ""
motd_must_not_contain = ""
min_players_max = 0

interval_seconds = 3.0
timeout_seconds = 2.0
fail_after = 2
recover_after = 2

# Additional stable recovery time before switching from FALLBACK back to MAIN.
# Useful for Minecraft servers that answer status pings before plugins/worlds are fully ready.
min_recovery_seconds = 0.0
jitter_seconds = 0.2

[connection]
timeout_seconds = 5.0
buffer_size = 65536
idle_timeout_seconds = 300.0
connect_fallback_on_main_connect_failure = true
tcp_keepalive = true
max_connections = 4096

[maintenance]
# "auto" = healthcheck decides routing.
# "force_fallback" = always route new players to fallback/waiting room.
# "force_main" = always route new players to main (even if healthcheck is unhealthy).
mode = "auto"

# Optional file-based override (checked dynamically, no restart needed):
# if this file exists, force_fallback is active.
# Ideal for maintenance windows.
force_fallback_file = ""

# Optional file-based override (checked dynamically, no restart needed):
# if this file exists, force_main is active.
# force_fallback_file has priority when both files exist.
force_main_file = ""

[monitoring]
# Optional local HTTP monitoring endpoint (disabled by default).
enabled = false
listen_host = "127.0.0.1"
listen_port = 8080
allow_remote = false

[logging]
level = "INFO"
[proxy_protocol]
# WARNING: Enable only if you know what you are doing.
# accept=true should only be used behind trusted HAProxy/reverse proxies.
# Always set trusted_proxy_ips when accept=true.
# send=true only if the upstream server expects PROXY protocol v1.
accept = false
send = false
version = 1
trusted_proxy_ips = []
