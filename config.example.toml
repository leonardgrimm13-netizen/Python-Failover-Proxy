# Minecraft Python Failover Proxy example configuration
# Copy this file to config.toml and adapt values for your environment.

[proxy]
# Host/IP where the proxy accepts incoming player connections.
# 0.0.0.0 = all IPv4 interfaces on this host.
listen_host = "0.0.0.0"
# TCP listen port for players.
listen_port = 25565

[main]
# Primary Minecraft server target.
host = "127.0.0.1"
port = 25567

[fallback]
# Fallback target when MAIN is considered unhealthy.
host = "127.0.0.1"
port = 25566

[healthcheck]
# Healthcheck mode:
# - "tcp" (recommended): only tests TCP reachability.
# - "minecraft_status": performs a Minecraft status ping.
mode = "tcp"
# Seconds between health checks.
interval_seconds = 3.0
# Timeout for each healthcheck attempt.
timeout_seconds = 2.0
# Consecutive failed checks required before switching to FALLBACK.
fail_after = 2
# Consecutive successful checks required before switching back to MAIN.
recover_after = 2

[connection]
# Timeout for establishing upstream connections.
timeout_seconds = 5.0
# Forwarding buffer size in bytes.
buffer_size = 65536

[logging]
# One of: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
