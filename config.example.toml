# Minecraft Python Failover Proxy example configuration

[proxy]
listen_host = "0.0.0.0"
listen_port = 25565

[main]
# Route target for players when MAIN is healthy.
# Example: local Velocity instance behind the failover proxy.
# IMPORTANT: Velocity must NOT listen on the same host+port as the failover proxy.
host = "127.0.0.1"
port = 25564

[fallback]
# Fallback / waiting room server.
host = "127.0.0.1"
port = 25566

[healthcheck]
# Healthcheck mode:
# - "tcp": simple TCP reachability check against MAIN/main target.
# - "minecraft_status": real Minecraft status ping.
#
# For a first start, "tcp" is the safest default.
# For Velocity setups, use "minecraft_status" and set target_host/target_port below.
mode = "tcp"

# Optional healthcheck override.
# If unset, main.host/main.port are checked.
# Useful when main points to Velocity but health should come from the real backend.
# Example:
# target_host = "100.64.0.10"
# target_port = 25567

# Minecraft status handshake protocol version (default: 767).
# Used only for mode = "minecraft_status".
protocol_version = 767
# status_hostname = "survival.example.com"

# true: require and parse valid JSON status response.
# false: accept valid status packet id 0x00 without JSON parsing.
require_valid_json = true

# true: log successful status details (version/players/latency).
# Can be noisy with low interval_seconds.
log_status_details = false

interval_seconds = 3.0
timeout_seconds = 2.0
fail_after = 2
recover_after = 2
jitter_seconds = 0.2

[connection]
timeout_seconds = 5.0
buffer_size = 65536
idle_timeout_seconds = 300.0
connect_fallback_on_main_connect_failure = true
tcp_keepalive = true
max_connections = 4096

[logging]
level = "INFO"

[monitoring]
enabled = false
listen_host = "127.0.0.1"
listen_port = 8080
allow_remote = false
