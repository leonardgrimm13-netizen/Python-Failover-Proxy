[proxy]
listen_host = "0.0.0.0"
listen_port = 25565

[main]
host = "127.0.0.1"
port = 25564

[fallback]
host = "127.0.0.1"
port = 25566

[healthcheck]
mode = "tcp"
interval_seconds = 3.0
timeout_seconds = 2.0
fail_after = 2
recover_after = 2
min_recovery_seconds = 0.0
protocol_version = 767
require_valid_json = true
log_status_details = false
jitter_seconds = 0.0
max_latency_ms = 0.0
expected_version_contains = ""
motd_must_contain = ""
motd_must_not_contain = ""
min_players_max = 0

[connection]
timeout_seconds = 5.0
buffer_size = 65536
idle_timeout_seconds = 300.0
connect_fallback_on_main_connect_failure = false
tcp_keepalive = false
max_connections = 4096

[maintenance]
mode = "auto"
force_fallback_file = ""
force_main_file = ""

[monitoring]
enabled = false
listen_host = "127.0.0.1"
listen_port = 8080
allow_remote = false

[proxy_protocol]
accept = false
send = false
version = 1
trusted_proxy_ips = []

[logging]
level = "INFO"
