[proxy]
listen_host = "0.0.0.0"
listen_port = 25565

[main]
host = "127.0.0.1"
port = 25567

[fallback]
host = "127.0.0.1"
port = 25566

[healthcheck]
mode = "tcp"
interval_seconds = 3.0
timeout_seconds = 2.0
fail_after = 2
recover_after = 2
jitter_seconds = 0.2

[connection]
timeout_seconds = 5.0
buffer_size = 65536
idle_timeout_seconds = 300.0
connect_fallback_on_main_connect_failure = true
tcp_keepalive = true
max_connections = 4096

[logging]
level = "INFO"
