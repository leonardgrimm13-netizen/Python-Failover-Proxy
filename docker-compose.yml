services:
  mc-failover:
    build: .
    container_name: mc-failover
    restart: unless-stopped
    ports:
      - "25565:25565/tcp"
      # - "127.0.0.1:8080:8080/tcp"
    volumes:
      - ./config.toml:/config/config.toml:ro
    # Optional on Linux if the container must reach services on the host:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
